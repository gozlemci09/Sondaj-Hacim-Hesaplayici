name: Windows Setup Oluşturucu

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodlari Sunucuya Indir
        uses: actions/checkout@v4

      - name: Python Kurulumu Yap
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Python Kodunu EXE Dosyasina Cevir
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "SondajHacimHesaplayici" "kuyu_hacmi.py"

      - name: Kurulum Sihirbazini Hazirla
        # Baştaki & işareti, sistemin bu tırnak içindeki programı çalıştırmasını sağlar
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" setup.iss

      - name: Hazir Dosyayi Bize Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Sondaj-Hacim-Kurulum-Dosyasi
          path: Output/Sondaj_Hacim_Kurulum.exe